<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAKAAR | Hacker Terminal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        :root {
            --neon-green: #00ff41;
            --dark-bg: #0d0d0d;
            --terminal-gray: #1a1a1a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--neon-green);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- Header / Logo Section --- */
        header {
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 2px solid var(--neon-green);
            box-shadow: 0 0 15px var(--neon-green);
            background: black;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .profile-img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 2px solid var(--neon-green);
            background: url('https://i.pinimg.com/originals/e8/88/d4/e888d400ee1d60d0360639bc077ef2cf.jpg') center/cover;
            box-shadow: 0 0 10px var(--neon-green);
        }

        .logo-text {
            font-size: 2rem;
            font-weight: bold;
            letter-spacing: 5px;
            text-shadow: 0 0 8px var(--neon-green);
        }

        /* --- Main Body --- */
        main {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }

        .terminal-box {
            width: 100%;
            background: var(--terminal-gray);
            border: 1px solid var(--neon-green);
            padding: 20px;
            margin-top: 20px;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
        }

        textarea {
            width: 100%;
            height: 150px;
            background: black;
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            padding: 10px;
            font-size: 1rem;
            resize: none;
            outline: none;
            margin-bottom: 20px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            flex: 1;
            padding: 15px;
            background: transparent;
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            min-width: 150px;
        }

        button:hover {
            background: var(--neon-green);
            color: black;
            box-shadow: 0 0 20px var(--neon-green);
        }

        /* --- Result Areas --- */
        #qrcode {
            margin: 20px auto;
            padding: 10px;
            background: white; /* QR needs light background to scan */
            border: 5px solid var(--neon-green);
            display: none;
        }

        #reader {
            width: 100%;
            margin-top: 20px;
            border: 1px solid var(--neon-green) !important;
        }

        .result-text {
            margin-top: 15px;
            padding: 10px;
            border: 1px dashed var(--neon-green);
            word-break: break-all;
            display: none;
        }

        /* --- Footer --- */
        footer {
            text-align: center;
            padding: 20px;
            font-size: 0.8rem;
            border-top: 1px solid var(--neon-green);
            background: black;
        }

        /* Responsive Adjustments */
        @media (max-width: 480px) {
            .logo-text { font-size: 1.5rem; }
            .profile-img { width: 45px; height: 45px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <div class="profile-img"></div>
            <div class="logo-text">WAKAAR</div>
        </div>
    </header>

    <main>
        <div class="terminal-box">
            <p style="margin-bottom: 10px;">> System.Initialize_QR_Protocol...</p>
            <textarea id="text-input" placeholder="Enter Name, Number, Email or Script here..."></textarea>
            
            <div class="btn-group">
                <button onclick="generateQR()">Generate QR Code</button>
                <button onclick="startScanner()">Open Scanner</button>
            </div>

            <div id="qrcode"></div>
            
            <div id="reader"></div>
            <div id="scan-result" class="result-text"></div>
        </div>
    </main>

    <footer>
        &copy; 2024 WAKAAR | Designed by ANJALI
    </footer>

    <script>
        // --- QR Generation Logic ---
        function generateQR() {
            const text = document.getElementById('text-input').value;
            const qrContainer = document.getElementById('qrcode');
            
            if (text.trim() === "") {
                alert("Please enter some text first!");
                return;
            }

            qrContainer.innerHTML = ""; // Clear previous QR
            qrContainer.style.display = "block";

            new QRCode(qrContainer, {
                text: text,
                width: 200,
                height: 200,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });
        }

        // --- QR Scanner Logic ---
        function startScanner() {
            const resultElement = document.getElementById('scan-result');
            resultElement.style.display = "none";
            
            const html5QrCode = new Html5Qrcode("reader");
            
            const config = { fps: 10, qrbox: { width: 250, height: 250 } };

            html5QrCode.start({ facingMode: "environment" }, config, (decodedText) => {
                resultElement.innerText = "SCANNED DATA: " + decodedText;
                resultElement.style.display = "block";
                html5QrCode.stop(); // Stop scanning after success
            }).catch((err) => {
                console.log("Scanner error: ", err);
            });
        }
    </script>
</body>
</html>
